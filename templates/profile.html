{% extends "base.html" %}

{% block content %}
<style>
    .panel-card { background-color: #27272A; border: 1px solid #3F3F46; border-radius: 12px; padding: 24px; }
    .dark-input { background-color: #18181B; border: 1px solid #3F3F46; color: #F4F4F5; border-radius: 8px; padding: 10px 14px; transition: all 0.2s; }
    .dark-input:focus { border-color: #A78BFA; box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2); outline: none; }
    .dark-input[readonly], .dark-input[disabled] { background-color: transparent; border-color: transparent; padding-left: 0; color: #A1A1AA; pointer-events: none; resize: none; }
    .profile-avatar { width: 80px; height: 80px; background-color: rgba(167, 139, 250, 0.15); color: #C4B5FD; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; font-weight: bold; margin-bottom: 1rem; border: 2px solid #6D28D9; }
    .btn-purple { background-color: #6D28D9; color: white; border: none; border-radius: 8px; padding: 10px 24px; font-weight: 600; transition: all 0.2s; }
    .btn-purple:hover { background-color: #5B21B6; }
    .btn-outline-purple { background: transparent; border: 1px solid #4C1D95; color: #A78BFA; border-radius: 8px; padding: 8px 16px; font-size: 0.9rem; font-weight: 600; }
    .btn-outline-purple:hover { background: rgba(76, 29, 149, 0.2); }
    .text-muted-custom { color: #A1A1AA; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; }
</style>

<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h3 text-white fw-bold mb-0">System Profile</h1>
    <button type="button" class="btn-outline-purple" id="editBtn" onclick="enableEditMode()">✏️ Edit Profile</button>
</div>

<div class="row g-4">
    <div class="col-md-4">
        <div class="panel-card h-100 text-center">
            <div class="d-flex justify-content-center">
                <div class="profile-avatar">{{ user.username[0] | upper }}</div>
            </div>
            <h5 class="text-white fw-bold mt-2">{{ user.username }}</h5>
            <p style="color: #A1A1AA; font-size: 0.9rem;">{{ user.email }}</p>
            <span class="badge" style="background: rgba(167, 139, 250, 0.15); color: #C4B5FD; border: 1px solid rgba(167, 139, 250, 0.3); padding: 6px 12px; border-radius: 12px;">{{ user.role }}</span>
        </div>
    </div>

    <div class="col-md-8">
        <div class="panel-card">
            <form method="POST" action="/profile" id="profileForm">
                <h6 class="text-white fw-bold mb-3 pb-3" style="border-bottom: 1px solid #3F3F46;">Account Details</h6>
                <div class="row mb-3">
                    <div class="col-md-6 mb-3">
                        <label class="form-label text-muted-custom">Full Name</label>
                        <input type="text" name="name" class="form-control dark-input editable-field" value="{{ user.username }}" readonly required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label text-muted-custom">Email Address</label>
                        <input type="email" name="email" class="form-control dark-input editable-field" value="{{ user.email }}" readonly required>
                    </div>
                </div>
                
                <div class="mb-4 d-none" id="passwordBlock">
                    <label class="form-label text-muted-custom">Update Password</label>
                    <input type="password" name="password" class="form-control dark-input" placeholder="Leave blank to keep current">
                </div>

                <h6 class="text-white fw-bold mb-3 mt-5 pb-3" style="border-bottom: 1px solid #3F3F46;">Billing & Shipping</h6>
                <div class="mb-4">
                    <label class="form-label text-muted-custom">Saved Address</label>
                    <textarea name="address" class="form-control dark-input editable-field" rows="3" readonly placeholder="No address saved.">{{ user.address or '' }}</textarea>
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted-custom">Default Payment Method</label>
                    <select name="preferred_payment" class="form-select dark-input editable-field" disabled>
                        <option value="UPI" {% if user.preferred_payment == 'UPI' %}selected{% endif %}>UPI</option>
                        <option value="COD" {% if user.preferred_payment == 'COD' %}selected{% endif %}>Cash on Delivery</option>
                    </select>
                </div>

                <div class="d-flex justify-content-end mt-4 pt-4 d-none" id="saveBlock" style="border-top: 1px solid #3F3F46;">
                    <button type="button" class="btn btn-sm btn-outline-secondary me-3" style="border-radius: 8px; color: #A1A1AA;" onclick="location.reload()">Cancel</button>
                    <button type="submit" class="btn-purple">Save Updates</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    function enableEditMode() {
        document.querySelectorAll('.editable-field').forEach(field => { field.removeAttribute('readonly'); field.removeAttribute('disabled'); });
        document.getElementById('passwordBlock').classList.remove('d-none');
        document.getElementById('saveBlock').classList.remove('d-none');
        document.getElementById('editBtn').classList.add('d-none');
        document.querySelector('textarea[name="address"]').focus();
    }
</script>
{% endblock %}
