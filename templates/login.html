<!DOCTYPE html>
<html>
<head>
    <title>Login - Core Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card p-4 shadow-sm" style="width: 100%; max-width: 400px;">
        <h3 class="text-center mb-4">Core Inventory Login</h3>
        {% with messages = get_flashed_messages() %}
            {% if messages %}<div class="alert alert-info">{{ messages[0] }}</div>{% endif %}
        {% endwith %}
        <form method="POST" action="/login">
            <div class="mb-3">
                <label>Email</label>
                <input type="email" name="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Log In</button>
        </form>
        <div class="text-center mt-3"><a href="/signup">Need an account? Sign up</a></div>
    </div>
</body>
</html>
