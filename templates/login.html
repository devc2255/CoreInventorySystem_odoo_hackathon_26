<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - CoreInventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #18181B; color: #F4F4F5; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: 'Inter', system-ui, sans-serif; }
        .panel-card { background-color: #27272A; border: 1px solid #3F3F46; border-radius: 12px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .dark-input { background-color: #18181B; border: 1px solid #3F3F46; color: #F4F4F5; border-radius: 8px; padding: 12px 16px; transition: all 0.2s; width: 100%; }
        .dark-input:focus { border-color: #A78BFA; box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2); outline: none; }
        .form-label { color: #A1A1AA; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-purple { background-color: #6D28D9; color: white; border: none; border-radius: 8px; padding: 12px; font-weight: 600; transition: background-color 0.2s; width: 100%; }
        .btn-purple:hover { background-color: #5B21B6; }
        .text-purple { color: #A78BFA; text-decoration: none; }
        .text-purple:hover { color: #C4B5FD; }
        .logo-dot { color: #A78BFA; }
    </style>
</head>
<body>
    <div class="panel-card">
        <h3 class="text-center mb-1 fw-bold">CoreInventory<span class="logo-dot">.</span></h3>
        <p class="text-center mb-4" style="color: #A1A1AA; font-size: 0.9rem;">Sign in to your workspace</p>
        {% with messages = get_flashed_messages() %}
            {% if messages %}<div class="alert alert-danger" style="background: rgba(248, 113, 113, 0.1); border: 1px solid rgba(248, 113, 113, 0.3); color: #FCA5A5;">{{ messages[0] }}</div>{% endif %}
        {% endwith %}
        <form method="POST" action="/login">
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" class="dark-input" required placeholder="name@company.com">
            </div>
            <div class="mb-4">
                <div class="d-flex justify-content-between">
                    <label class="form-label">Password</label>
                    <a href="#" class="text-purple" style="font-size: 0.85rem;">Forgot?</a>
                </div>
                <input type="password" name="password" class="dark-input" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-purple">Log In</button>
        </form>
        <div class="text-center mt-4" style="font-size: 0.85rem; color: #A1A1AA;">Don't have an account? <a href="/signup" class="text-purple fw-bold">Sign up</a></div>
    </div>
</body>
</html>
