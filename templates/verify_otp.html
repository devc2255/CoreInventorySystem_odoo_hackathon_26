<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verify OTP - CoreInventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #18181B; color: #F4F4F5; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: 'Inter', system-ui, sans-serif; }
        .panel-card { background-color: #27272A; border: 1px solid #3F3F46; border-radius: 12px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center;}
        .dark-input { background-color: #18181B; border: 1px solid #3F3F46; color: #F4F4F5; border-radius: 8px; padding: 12px 16px; transition: all 0.2s; width: 100%; text-align: center; font-size: 1.5rem; letter-spacing: 10px; font-weight: bold;}
        .dark-input:focus { border-color: #A78BFA; box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2); outline: none; }
        .form-label { color: #A1A1AA; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-purple { background-color: #6D28D9; color: white; border: none; border-radius: 8px; padding: 12px; font-weight: 600; transition: background-color 0.2s; width: 100%; }
        .btn-purple:hover { background-color: #5B21B6; }
    </style>
</head>
<body>
    <div class="panel-card">
        <h4 class="mb-3 fw-bold">Check your email</h4>
        <p class="mb-4" style="color: #A1A1AA; font-size: 0.9rem;">We sent a 6-digit code to <strong>{{ session.get('reset_email') }}</strong>. Enter it below to verify your identity.</p>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'danger' if category == 'danger' else 'info' }}" style="background: rgba(167, 139, 250, 0.1); border: 1px solid rgba(167, 139, 250, 0.3); color: #C4B5FD; font-size: 0.85rem; text-align: left;">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="POST" action="/verify-otp">
            <div class="mb-4 text-start">
                <label class="form-label">6-Digit OTP</label>
                <input type="text" name="otp" class="dark-input" required maxlength="6" autocomplete="off" placeholder="------">
            </div>
            <button type="submit" class="btn-purple">Verify Identity</button>
        </form>
    </div>
</body>
</html>
