<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password - CoreInventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #18181B; color: #F4F4F5; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: 'Inter', system-ui, sans-serif; }
        .panel-card { background-color: #27272A; border: 1px solid #3F3F46; border-radius: 12px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .dark-input { background-color: #18181B; border: 1px solid #3F3F46; color: #F4F4F5; border-radius: 8px; padding: 12px 16px; transition: all 0.2s; width: 100%; }
        .dark-input:focus { border-color: #A78BFA; box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.2); outline: none; }
        .form-label { color: #A1A1AA; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-purple { background-color: #10B981; color: white; border: none; border-radius: 8px; padding: 12px; font-weight: 600; transition: background-color 0.2s; width: 100%; }
        .btn-purple:hover { background-color: #059669; }
    </style>
</head>
<body>
    <div class="panel-card">
        <h4 class="mb-3 fw-bold text-center">Secure Your Account</h4>
        <p class="text-center mb-4" style="color: #A1A1AA; font-size: 0.9rem;">Identity verified. Please create a new password for your account.</p>
        
        <form method="POST" action="/reset-password">
            <div class="mb-4">
                <label class="form-label">New Password</label>
                <input type="password" name="password" class="dark-input" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-purple">Confirm New Password</button>
        </form>
    </div>
</body>
</html>
